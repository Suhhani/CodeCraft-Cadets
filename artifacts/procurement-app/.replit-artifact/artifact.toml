kind = "web"
previewPath = "/"
title = "Procurement Management System"
version = "1.0.0"
id = "artifacts/procurement-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18414

[services.development]
run = "pnpm --filter @workspace/procurement-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/procurement-app", "run", "build" ]
publicDir = "artifacts/procurement-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18414"
BASE_PATH = "/"
